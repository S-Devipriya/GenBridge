<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenBridge - Digital Literacy Platform</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header-bar">
        <a href="/" class="brand-logo">☀ GenBridge</a>
        
        <nav class="nav-links">
            <div class="accessibility-text-controls">
                <button onclick="changeFontSize('small')" class="text-size-btn text-sm-indicator">A</button>
                <button onclick="changeFontSize('normal')" class="text-size-btn text-md-indicator active-size">A</button>
                <button onclick="changeFontSize('large')" class="text-size-btn text-lg-indicator">A</button>
            </div>

            <div class="language-select-wrapper">
                <span class="language-icon">🌐</span>
                <select id="language-picker" class="language-dropdown-selector">
                    <option value="en" selected>English</option>
                    <option value="ml">മലയാളം (Malayalam)</option>
                    <option value="hi">हिन्दी (Hindi)</option>
                </select>
            </div>

            <a href="/login" class="nav-btn">Log In</a>
        </nav>
    </header>

    <main class="main-container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer-bar">
        <p>GenBridge Eco-Learning System. Designed explicitly for digital accessibility.</p>
        <p>Any Queries or Suggestions? Contact us at <a href="mailto:info@genbridge.org">info@genbridge.org</a></p>
        <a href="/register-volunteer">Register as Volunteer</a>
    </footer>

</body>
</html>
