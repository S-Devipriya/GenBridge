{% extends 'base.html' %}

{% block content %}

    <section class="unified-panel auth-container">
        <div class="auth-content-box">
            <h2 class="auth-main-heading">Log In</h2>
            
            <form action="/login-submit" method="POST" class="auth-vertical-form">
                <div class="form-input-group">
                    <label for="login-email" class="form-label-text">Your Email Address</label>
                    <input type="email" id="login-email" name="email" placeholder="example@mail.com" class="search-text-input" required>
                </div>
                
                <div class="form-input-group">
                    <label for="login-password" class="form-label-text">Your Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter your password" class="search-text-input" required>
                </div>
                
                <button type="submit" class="card-primary-btn auth-submit-btn">Log In</button>
            </form>

            <p class="auth-switch-text">
                Don't have an account? <a href="/register" class="auth-inline-link">Click here to register</a>
            </p>
        </div>
    </section>

    <div class="hub-pagination-row">
        <a href="/" class="hub-btn">Return to Home Page</a>
    </div>

{% endblock %}
